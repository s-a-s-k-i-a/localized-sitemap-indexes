name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Lint PHP files
        run: composer lint:php

      - name: Run PHPCS
        run: composer lint:phpcs

      - name: Check version consistency
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          header_version="$(sed -n 's/^ \* Version:[[:space:]]*//p' localized-sitemap-indexes.php | head -n 1 | tr -d '\r')"
          constant_version="$(sed -n "s/^define( 'LOCALIZED_SITEMAP_INDEXES_VERSION', '\(.*\)' );/\1/p" localized-sitemap-indexes.php | head -n 1)"
          stable_tag="$(sed -n 's/^Stable tag:[[:space:]]*//p' readme.txt | head -n 1 | tr -d '\r')"
          echo "Tag: $tag_version"
          echo "Plugin header: $header_version"
          echo "Version constant: $constant_version"
          echo "readme.txt stable tag: $stable_tag"
          if [ "$tag_version" != "$header_version" ] || [ "$tag_version" != "$constant_version" ] || [ "$tag_version" != "$stable_tag" ]; then
            echo "Version mismatch between tag, plugin header, version constant, and readme.txt stable tag." >&2
            exit 1
          fi

      - name: Build release ZIP
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ github.token }}"}}'
        run: composer build:zip

      - name: Extract release notes
        run: sh bin/release-notes.sh "${GITHUB_REF_NAME#v}" > "$RUNNER_TEMP/release-notes.md"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: Language Sitemaps for TranslatePress ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: build/localized-sitemap-indexes-*.zip

      # Hand the new release off to isla-stud.io: the mu-plugin there triggers
      # the EDD Git Download Updater to localize the release ZIP into
      # wp-content/uploads/edd/ and bumps the EDD Software Licensing version,
      # so store-installed copies see the update. Webhook is HMAC-SHA256-signed
      # with a shared secret (repo secret WEBHOOK_SECRET, mirrored in the
      # wp_option fbp_webhook_secret on isla-stud.io; never committed). The
      # step fails the workflow on non-2xx.
      - name: Notify isla-stud.io to localize the new release ZIP
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(printf '{"repo":"%s","tag":"%s"}' "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME")
          SIGNATURE="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | awk '{print $NF}')"
          HTTP_CODE=$(curl -sS -o /tmp/webhook-response.json -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            -H "X-Fbp-Signature: $SIGNATURE" \
            -d "$PAYLOAD" \
            'https://isla-stud.io/wp-json/fbp-webhooks/v1/release')
          echo "Webhook HTTP $HTTP_CODE"
          cat /tmp/webhook-response.json
          echo
          test "$HTTP_CODE" -ge 200 && test "$HTTP_CODE" -lt 300
